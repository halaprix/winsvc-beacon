name: CI

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify scaffold files
        run: |
          test -f README.md
          test -f SPEC.md
          test -f AGENTS.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f .github/PULL_REQUEST_TEMPLATE.md
      - name: Public-safety smoke check
        run: |
          ! grep -R "ghp_\|github_pat_\|KUMA_[A-Z0-9_]*_PUSH_URL=https://" \
            README.md SPEC.md AGENTS.md CHANGELOG.md CONTRIBUTING.md SECURITY.md .github
